<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stew — Video Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0a0a; --surface: #111111; --border: #1e1e1e;
      --accent: #e8ff47; --text: #f0f0f0; --muted: #666;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--text); font-family: var(--font-body); font-weight: 300; line-height: 1.6; min-height: 100vh; cursor: crosshair; }
    body::before { content: ''; position: fixed; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E"); pointer-events: none; z-index: 0; opacity: 0.4; }
    header { position: relative; z-index: 1; padding: 4rem 6vw 3rem; display: flex; flex-direction: column; gap: 1.5rem; border-bottom: 1px solid var(--border); }
    .header-top { display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    .wordmark { font-family: var(--font-display); font-size: clamp(4rem, 10vw, 9rem); letter-spacing: 0.02em; line-height: 0.9; color: var(--text); }
    .wordmark span { color: var(--accent); }
    .tagline { font-size: 0.85rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); padding-bottom: 0.4rem; }
    .stats-bar { display: flex; align-items: center; gap: 2rem; flex-wrap: wrap; padding: 1.4rem 0 0; border-top: 1px solid var(--border); }
    .stat { display: flex; flex-direction: column; gap: 2px; }
    .stat-label { font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }
    .stat-value { font-family: var(--font-display); font-size: 2.2rem; letter-spacing: 0.04em; color: var(--accent); line-height: 1; }
    .stat-value.loading { color: var(--muted); font-size: 1.4rem; }
    .divider { width: 1px; height: 2.5rem; background: var(--border); flex-shrink: 0; }
    .live-dot { display: inline-flex; align-items: center; gap: 6px; font-size: 0.7rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); margin-left: auto; }
    .live-dot::before { content: ''; width: 7px; height: 7px; border-radius: 50%; background: var(--accent); animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(0.7); } }
    main { position: relative; z-index: 1; padding: 4rem 6vw; }
    .section-label { font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 2rem; }
    .section-block { margin-bottom: 4rem; }

    /* Regular video grid */
    .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    .video-card { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; transition: border-color 0.25s, transform 0.25s; animation: fadeUp 0.5s ease both; }
    .video-card:hover { border-color: var(--accent); transform: translateY(-3px); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    .thumb-wrap { position: relative; width: 100%; padding-top: 56.25%; background: #0d0d0d; overflow: hidden; cursor: pointer; }
    .thumb-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .video-card:hover .thumb-wrap img { transform: scale(1.04); }
    .play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0); transition: background 0.25s; }
    .video-card:hover .play-btn { background: rgba(0,0,0,0.35); }
    .play-icon { width: 52px; height: 52px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0.7); transition: opacity 0.25s, transform 0.25s; }
    .play-icon svg { width: 20px; height: 20px; fill: #0a0a0a; margin-left: 3px; }
    .video-card:hover .play-icon { opacity: 1; transform: scale(1); }
    .thumb-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; }
    .thumb-wrap.playing img, .thumb-wrap.playing .play-btn { display: none; }
    .thumb-wrap.playing iframe { display: block; }
    .card-info { padding: 0.9rem 1rem; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .card-title { font-size: 0.82rem; color: var(--text); font-weight: 400; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
    .card-views { font-family: var(--font-display); font-size: 1rem; color: var(--muted); letter-spacing: 0.06em; flex-shrink: 0; }

    /* Shorts grid — portrait cards */
    .shorts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1.2rem; }
    .short-card { position: relative; background: var(--surface); border: 1px solid var(--border); border-radius: 2px; overflow: hidden; transition: border-color 0.25s, transform 0.25s; animation: fadeUp 0.5s ease both; }
    .short-card:hover { border-color: var(--accent); transform: translateY(-3px); }
    .short-thumb-wrap { position: relative; width: 100%; padding-top: 177.78%; background: #0d0d0d; overflow: hidden; cursor: pointer; }
    .short-thumb-wrap img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transition: transform 0.4s ease; }
    .short-card:hover .short-thumb-wrap img { transform: scale(1.04); }
    .short-thumb-wrap .play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0); transition: background 0.25s; }
    .short-card:hover .short-thumb-wrap .play-btn { background: rgba(0,0,0,0.35); }
    .short-thumb-wrap .play-icon { width: 44px; height: 44px; border-radius: 50%; background: var(--accent); display: flex; align-items: center; justify-content: center; opacity: 0; transform: scale(0.7); transition: opacity 0.25s, transform 0.25s; }
    .short-thumb-wrap .play-icon svg { width: 16px; height: 16px; fill: #0a0a0a; margin-left: 2px; }
    .short-card:hover .short-thumb-wrap .play-icon { opacity: 1; transform: scale(1); }
    .short-thumb-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; display: none; }
    .short-thumb-wrap.playing img, .short-thumb-wrap.playing .play-btn { display: none; }
    .short-thumb-wrap.playing iframe { display: block; }

    /* Show more button */
    #show-more-btn, #show-more-shorts-btn { background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: var(--font-display); font-size: 1.1rem; letter-spacing: 0.12em; padding: 0.75rem 2.5rem; border-radius: 2px; cursor: pointer; transition: background 0.2s, color 0.2s; }
    #show-more-btn:hover, #show-more-shorts-btn:hover { background: var(--accent); color: #0a0a0a; }

    /* Social icons */
    .social-bar { display: flex; justify-content: center; align-items: center; gap: 2rem; padding: 3rem 6vw; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
    .social-link { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; text-decoration: none; color: var(--muted); transition: color 0.2s, transform 0.2s; }
    .social-link:hover { color: var(--accent); transform: translateY(-3px); }
    .social-link svg { width: 28px; height: 28px; fill: currentColor; }
    .social-link span { font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase; }

    /* Footer */
    footer { position: relative; z-index: 1; padding: 2rem 6vw; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
    footer p { font-size: 0.75rem; color: var(--muted); letter-spacing: 0.08em; }
    .footer-accent { font-family: var(--font-display); font-size: 1.1rem; color: var(--accent); letter-spacing: 0.1em; }

    .video-card:nth-child(1) { animation-delay: 0.05s; } .video-card:nth-child(2) { animation-delay: 0.10s; } .video-card:nth-child(3) { animation-delay: 0.15s; } .video-card:nth-child(4) { animation-delay: 0.20s; } .video-card:nth-child(5) { animation-delay: 0.25s; } .video-card:nth-child(6) { animation-delay: 0.30s; }
    @media (max-width: 600px) { header { padding: 2.5rem 5vw 2rem; } main { padding: 2.5rem 5vw; } .stats-bar { gap: 1.2rem; } .live-dot { margin-left: 0; } .social-bar { gap: 1.5rem; } }
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <h1 class="wordmark">STEW<span>.</span></h1>
    <p class="tagline">Video Editor &nbsp;/&nbsp; Content Creator</p>
  </div>
  <div class="stats-bar">
    <div class="stat">
      <span class="stat-label">Total Views</span>
      <span class="stat-value loading" id="total-views">--</span>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <span class="stat-label">Videos</span>
      <span class="stat-value" id="video-count">--</span>
    </div>
    <div class="divider"></div>
    <div class="stat">
      <span class="stat-label">Total Likes</span>
      <span class="stat-value loading" id="total-likes">--</span>
    </div>
    <span class="live-dot">Live stats</span>
  </div>
</header>

<main>
  <!-- Tabs -->
  <div style="display:flex;align-items:center;gap:1.5rem;margin-bottom:2rem;">
    <span id="tab-videos" onclick="switchTab('videos')" style="font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;color:var(--accent);border-bottom:1px solid var(--accent);padding-bottom:4px;transition:color 0.2s;">YouTube Videos</span>
    <span id="tab-shorts" onclick="switchTab('shorts')" style="font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;color:var(--muted);padding-bottom:4px;transition:color 0.2s;">Shorts</span>
  </div>

  <!-- Videos panel -->
  <div id="panel-videos">
    <div class="video-grid" id="video-grid"></div>
    <div id="show-more-wrap" style="display:flex;justify-content:center;margin-top:2rem;"></div>
  </div>

  <!-- Shorts panel -->
  <div id="panel-shorts" style="display:none;">
    <div class="shorts-grid" id="shorts-grid"></div>
    <div id="show-more-shorts-wrap" style="display:flex;justify-content:center;margin-top:2rem;"></div>
  </div>
</main>

<!-- Social bar -->
<div class="social-bar">
  <a href="https://www.youtube.com/@YungStew" target="_blank" class="social-link">

    <span>YouTube</span>
  </a>
  <a href="https://www.twitch.tv/yungstewtv" target="_blank" class="social-link">
    <svg viewBox="0 0 24 24"><path d="M11.6 6H13v4.5h-1.4V6zm3.8 0H17v4.5h-1.4V6zM2.1 0L.5 4v16.5H6V24h3.5l3.5-3.5H17l6.5-6.5V0H2.1zm19.4 13L18 16.5h-5l-3.5 3.5v-3.5H4.5V2h17v11z"/></svg>
    <span>Twitch</span>
  </a>

    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    <span>X</span>
  </a>

    <span>TikTok</span>
  </a>
</div>

<footer>
  <p id="contact-link"></p>
  <span class="footer-accent">STEW.</span>
</footer>

<script>
  var em = ['stew.inquiries', 'gmail.com'].join('@');
  document.getElementById('contact-link').innerHTML = '<a href="mailto:' + em + '" style="color:var(--muted);text-decoration:none;letter-spacing:0.08em;" onmouseover="this.style.color=\'var(--accent)\'" onmouseout="this.style.color=\'var(--muted)\'">' + em + '</a>';

  var API_KEY = 'AIzaSyDGsDHtvhG_ZMdbDDprxaOT3XzNMdT67_g';

  var SHORT_IDS = ['fXo38nNAvrU','4g4C34v8gEc'];

  var VIDEO_IDS = [
    '5PSYAfd0hf0','_wlIOtiy1aY','RJAEWnQCITk','NSQWtS72c5s',
    'yfXGEEPZRBE','VFhKF3O2GyY','_ETAVuUgaoU','j5PPCbpt-4A',
    '0_rg6Kx1mMQ','6Fg8MYdGNpk','apkj6yQ13N0','SYwDP2EXEOk',
    'QmWIj4MStf4','6xaR-OQC-zA','nGc8P9_WsMg','iK1XzXNhu0Q',
    '3XaTLY9ywwU','H-pYkk18k5s','aFaXLn3o7Qo','zepETXvCiUE',
    'AWb8tAPYwl0','IpVYDYFSd0w','0zMnXKxfTtU','FwJJZvM1KTQ',
    'ymFwYEYSUcg','LmuoSh4tKGc','uHO5RCFh0U0','K958GZ2QTGg',
    'KJunmBpPB4c','y7A-TlgjRLs','gTWXwH0JQjo','omaP7eGlzlI',
    'fBMI0Xzgf5M','CJomZ-ck_go','kh5tsVFo0RI','tzIdwqb31wI',
    'tEqZ-oxkPBg','U3Rp-8DaXlE','mBC61eLM8Pw','E4XobxaTJBU',
    't9z5x-cdWH4','7i37Xu1tlaE','YEu-lf0d1f0','TRMMa1YGh4U',
    'fMJe2U9eYMM','akrGSDFwvRo','TljhBNGWkjs','qz1j14NeADQ',
    '-UkLxVdo7uA','-XCAqjq3NbY','OhSFoZUlFAQ','xme9CZjygE4',
    'wOqf4GG1bKk','O9I1S9cfY58','ibOvB3QkFA4','mViloxYFTvQ',
    'PuO9VyXmxGI','-Drel-H74lk','32l7U0DDi4E','fiAkRaIEbOs'
  ];

  function formatNum(n) {
    if (n >= 1000000) return (n / 1000000).toFixed(1) + 'M';
    if (n >= 1000) return (n / 1000).toFixed(1) + 'K';
    return n.toLocaleString();
  }

  var allVideos = [];
  var allShorts = [];
  var shownVideos = 0;
  var shownShorts = 0;
  var PAGE_SIZE = 12;

  function buildVideoCard(v) {
    var card = document.createElement('div');
    card.className = 'video-card';
    card.innerHTML = '<div class="thumb-wrap" id="wrap-' + v.id + '">'
      + '<img src="https://i.ytimg.com/vi/' + v.id + '/hqdefault.jpg" alt="' + v.title + '" loading="lazy" />'
      + '<div class="play-btn"><div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>'
      + '<iframe id="iframe-' + v.id + '" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>'
      + '</div>'
      + '<div class="card-info"><span class="card-title">' + v.title + '</span><span class="card-views">' + formatNum(v.views) + '</span></div>';
    card.querySelector('.thumb-wrap').addEventListener('click', function() {
      var wrap = document.getElementById('wrap-' + v.id);
      var iframe = document.getElementById('iframe-' + v.id);
      if (!wrap.classList.contains('playing')) {
        iframe.src = 'https://www.youtube.com/embed/' + v.id + '?autoplay=1';
        wrap.classList.add('playing');
      }
    });
    return card;
  }

  function buildShortCard(v) {
    var card = document.createElement('div');
    card.className = 'short-card';
    card.innerHTML = '<div class="short-thumb-wrap" id="swrap-' + v.id + '">'
      + '<img src="https://i.ytimg.com/vi/' + v.id + '/hqdefault.jpg" alt="' + v.title + '" loading="lazy" />'
      + '<div class="play-btn"><div class="play-icon"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>'
      + '<iframe id="siframe-' + v.id + '" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>'
      + '</div>'
      + '<div class="card-info"><span class="card-title">' + v.title + '</span><span class="card-views">' + formatNum(v.views) + '</span></div>';
    card.querySelector('.short-thumb-wrap').addEventListener('click', function() {
      var wrap = document.getElementById('swrap-' + v.id);
      var iframe = document.getElementById('siframe-' + v.id);
      if (!wrap.classList.contains('playing')) {
        iframe.src = 'https://www.youtube.com/embed/' + v.id + '?autoplay=1';
        wrap.classList.add('playing');
      }
    });
    return card;
  }

  function renderVideosBatch() {
    var grid = document.getElementById('video-grid');
    var batch = allVideos.slice(shownVideos, shownVideos + PAGE_SIZE);
    batch.forEach(function(v) { grid.appendChild(buildVideoCard(v)); });
    shownVideos += batch.length;
    var btn = document.getElementById('show-more-btn');
    if (btn) btn.remove();
    if (shownVideos < allVideos.length) {
      var remaining = allVideos.length - shownVideos;
      var newBtn = document.createElement('button');
      newBtn.id = 'show-more-btn';
      newBtn.textContent = 'Show More (' + remaining + ' left)';
      newBtn.onclick = renderVideosBatch;
      document.getElementById('show-more-wrap').appendChild(newBtn);
    }
  }

  function renderShortsBatch() {
    var grid = document.getElementById('shorts-grid');
    var batch = allShorts.slice(shownShorts, shownShorts + PAGE_SIZE);
    batch.forEach(function(v) { grid.appendChild(buildShortCard(v)); });
    shownShorts += batch.length;
    var btn = document.getElementById('show-more-shorts-btn');
    if (btn) btn.remove();
    if (shownShorts < allShorts.length) {
      var remaining = allShorts.length - shownShorts;
      var newBtn = document.createElement('button');
      newBtn.id = 'show-more-shorts-btn';
      newBtn.textContent = 'Show More (' + remaining + ' left)';
      newBtn.onclick = renderShortsBatch;
      document.getElementById('show-more-shorts-wrap').appendChild(newBtn);
    }
  }

  function showError(msg) {
    document.getElementById('total-views').textContent = 'ERR';
    document.getElementById('total-likes').textContent = 'ERR';
    document.getElementById('video-grid').innerHTML = '<div style="grid-column:1/-1;padding:2rem;color:var(--accent);font-size:0.8rem;border:1px solid var(--border);border-radius:2px;">Error: ' + msg + '</div>';
  }

  function fetchChunk(ids) {
    return fetch('https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics&id=' + ids.join(',') + '&key=' + API_KEY)
      .then(function(r) { return r.json(); });
  }

  function fetchAll() {
    var allIDs = VIDEO_IDS.concat(SHORT_IDS);
    var chunks = [];
    for (var i = 0; i < allIDs.length; i += 50) {
      chunks.push(allIDs.slice(i, i + 50));
    }
    var promises = chunks.map(function(c) { return fetchChunk(c); });
    Promise.all(promises).then(function(results) {
      var allItems = [];
      for (var r = 0; r < results.length; r++) {
        if (results[r].error) { showError(results[r].error.message); return; }
        if (results[r].items) allItems = allItems.concat(results[r].items);
      }
      if (allItems.length === 0) { showError('No videos returned.'); return; }

      var totalViews = 0, totalLikes = 0;
      var shortSet = {};
      SHORT_IDS.forEach(function(id) { shortSet[id] = true; });

      allItems.forEach(function(item) {
        var views = parseInt(item.statistics.viewCount || '0', 10);
        var likes = parseInt(item.statistics.likeCount || '0', 10);
        totalViews += views;
        totalLikes += likes;
        var obj = { id: item.id, title: item.snippet.title, views: views };
        if (shortSet[item.id]) { allShorts.push(obj); } else { allVideos.push(obj); }
      });

      allVideos.sort(function(a, b) { return b.views - a.views; });
      allShorts.sort(function(a, b) { return b.views - a.views; });

      renderVideosBatch();
      renderShortsBatch();

      document.getElementById('total-views').classList.remove('loading');
      document.getElementById('total-views').textContent = formatNum(totalViews);
      document.getElementById('video-count').textContent = allVideos.length + allShorts.length;
      document.getElementById('total-likes').classList.remove('loading');
      document.getElementById('total-likes').textContent = formatNum(totalLikes);
    }).catch(function(err) { showError(err.message); });
  }

  function switchTab(tab) {
    var isVideos = tab === 'videos';
    document.getElementById('panel-videos').style.display = isVideos ? 'block' : 'none';
    document.getElementById('panel-shorts').style.display = isVideos ? 'none' : 'block';
    var tvTab = document.getElementById('tab-videos');
    var tsTab = document.getElementById('tab-shorts');
    tvTab.style.color = isVideos ? 'var(--accent)' : 'var(--muted)';
    tvTab.style.borderBottom = isVideos ? '1px solid var(--accent)' : 'none';
    tsTab.style.color = isVideos ? 'var(--muted)' : 'var(--accent)';
    tsTab.style.borderBottom = isVideos ? 'none' : '1px solid var(--accent)';
  }

  fetchAll();
</script>
